; PlatformIO Project Configuration File
;
; Two build environments:
;   pio run -e python       Build Python-integration firmware (main.c)
;   pio run -e lab_demo     Build interactive lab-demo firmware (main_lab_demo.c)
;
; Upload:
;   pio run -e python -t upload
;   pio run -e lab_demo -t upload
;
; Monitor (either):
;   pio device monitor -b 230400

; ---- Shared settings ----
[common]
platform = ststm32@16.1.0
board = nucleo_f446re
framework = zephyr
monitor_speed = 230400

; ---- Python integration (default) ----
[env:python]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
src_filter = +<*> -<main_lab_demo.c>

; ---- Interactive lab demo (standalone, no Python needed) ----
[env:lab_demo]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
src_filter = +<*> -<main.c> -<uart_getline.c>
